services:
  web:
    build: .
    platform: linux/amd64
    image: veilframe-web:dev
    restart: unless-stopped
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    command: flask --app app run --host 0.0.0.0 --port 5000 --debug
    ports:
      - "5050:5000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/tools"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
